services:

  mongo:
    image: mongo:latest
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:latest
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api-gateway:
    build: ./api-gateway
    ports:
      - "${API_GATEWAY_PORT}:3000"
    env_file:
      - .env

  auth-service:
    build: ./services/auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:3000"
    env_file:
      - .env

  content-service:
    build: ./services/content-service
    ports:
      - "${CONTENT_SERVICE_PORT:-3002}:3000"
    environment:
      - AUDIT_SERVICE_URL=http://audit-service:3000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
    env_file:
      - .env

  notification-service:
    build: ./services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3003}:3000"
    env_file:
      - .env

  report-service:
    build: ./services/report-service
    ports:
      - "${REPORT_SERVICE_PORT:-3004}:3000"
    volumes:
      - reports_data:/app/reports_data
    environment:
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    env_file:
      - .env

  audit-service:
    build: ./services/audit-service
    ports:
      - "${AUDIT_SERVICE_PORT:-3005}:3000"
    env_file:
      - .env

volumes:
  mongodb_data:
  reports_data: