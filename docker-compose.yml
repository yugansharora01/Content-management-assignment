services:

  api-gateway:
    build: ./api-gateway
    ports:
      - "${API_GATEWAY_PORT}:3000"
    env_file:
      - .env

  auth-service:
    build: ./services/auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:3000"
    env_file:
      - .env

  content-service:
    build: ./services/content-service
    ports:
      - "${CONTENT_SERVICE_PORT}:3000"
    env_file:
      - .env

  notification-service:
    build: ./services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:3000"
    env_file:
      - .env

  report-service:
    build: ./services/report-service
    ports:
      - "${REPORT_SERVICE_PORT}:3000"
    env_file:
      - .env

  audit-service:
    build: ./services/audit-service
    ports:
      - "${AUDIT_SERVICE_PORT}:3000"
    env_file:
      - .env